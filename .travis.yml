language: go

# We'll test on latest stable
go:
  - 1.26

os:
  - linux
  - osx

addons:
  apt:
    packages:
    - libpcap0.8-dev

install:
  # TODO: Add coverage to project after adding tests
  # - go get golang.org/x/tools/cmd/cover
  - go get -d -v ./...

script:
  - go tool vet -all -v . || true
  - go generate -v ./...
  - go build -v ./...
